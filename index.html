firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

// Mapa em memória para objetos passados via onclick
const _REF = {};
let _refIdx = 0;
function setRef(obj){ const k='r'+(++_refIdx); _REF[k]=obj; return k; }
function getRef(k){ return _REF[k]; }

const S = {
  user:null, userData:null,

function toast(msg,dur=3000){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',dur);}
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const md=s=>s?marked.parse(s,{breaks:true}):'';

function applyHighlight(){
  document.querySelectorAll('.md pre code').forEach(el=>hljs.highlightElement(el));
  document.querySelectorAll('.md pre').forEach(pre=>{
    if(pre.querySelector('.copy-btn'))return;
    const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='Copiar';
    btn.onclick=()=>{const c=pre.querySelector('code');navigator.clipboard.writeText(c?c.innerText:pre.innerText).then(()=>{btn.textContent='✓ Copiado!';setTimeout(()=>btn.textContent='Copiar',2000);});};
    pre.appendChild(btn);
  });
}

// ── Firestore ops ─────────────────────────────────────────────
const loadUserData          = uid => db.collection('users').doc(uid).get().then(d=>d.exists?d.data():null);
const loadAllEtls           = ()  => db.collection('etls').orderBy('name').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()})));
const loadAllUsers          = ()  => db.collection('users').orderBy('name').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()})));
const loadAllRelatorios     = ()  => db.collection('relatorios').orderBy('criadoEm','desc').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()})));
const loadAllConsultas      = ()  => db.collection('consultas').orderBy('name').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()})));
async function loadAccessibleEtls(ids){if(!ids?.length)return[];const out=[];for(const id of ids){const d=await db.collection('etls').doc(id).get();if(d.exists)out.push({id:d.id,...d.data()});}return out;}
async function loadAccessibleRelatorios(ids){if(!ids?.length)return[];const out=[];for(const id of ids){const d=await db.collection('relatorios').doc(id).get();if(d.exists)out.push({id:d.id,...d.data()});}return out;}
async function loadAccessibleConsultas(ids){if(!ids?.length)return[];const out=[];for(const id of ids){const d=await db.collection('consultas').doc(id).get();if(d.exists)out.push({id:d.id,...d.data()});}return out;}

function normalizeDriveUrl(url){
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return`https://drive.google.com/uc?export=download&id=${m[1]}`;
  return url;
}

]};

function setView(v){S.view=v;render();}
function render(){
  const app=document.getElementById('app');

  app.innerHTML=(views[S.view]||loading)();
  if(S.view==='viewer'||S.view==='consultaViewer')setTimeout(applyHighlight,80);
  if(S.view==='landing')initLanding();
}

function initLanding(){
  const nav=document.getElementById('lp-nav');
  if(nav){const onScroll=()=>nav.classList.toggle('scrolled',window.scrollY>40);window.addEventListener('scroll',onScroll,{passive:true});onScroll();}
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
  const tel=document.getElementById('c-tel');
  if(tel){tel.addEventListener('input',function(){let v=this.value.replace(/\D/g,'').slice(0,11);if(v.length===0){this.value='';return;}if(v.length<=2)this.value='('+v;else if(v.length<=6)this.value='('+v.slice(0,2)+') '+v.slice(2);else if(v.length<=10)this.value='('+v.slice(0,2)+') '+v.slice(2,6)+'-'+v.slice(6);else this.value='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);});}
  const emailEl=document.getElementById('c-email');
  if(emailEl){
    emailEl.addEventListener('blur',function(){const valid=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value.trim());if(this.value.trim()===''){this.style.borderColor='';return;}this.style.borderColor=valid?'#16a34a':'#ef4444';this.style.boxShadow=valid?'0 0 0 3px rgba(22,163,74,.12)':'0 0 0 3px rgba(239,68,68,.12)';});
    emailEl.addEventListener('focus',function(){this.style.borderColor='#2E75B6';this.style.boxShadow='0 0 0 3px rgba(46,117,182,.15)';});
  }
}

async function submitContact(){
  const nome=document.getElementById('c-nome').value.trim(),email=document.getElementById('c-email').value.trim(),tipo=document.getElementById('c-tipo').value,msg=document.getElementById('c-msg').value.trim();
  const errEl=document.getElementById('form-error');errEl.classList.add('hidden');
  if(!nome||!email||!tipo||!msg){errEl.textContent='Preencha todos os campos obrigatórios (*).';errEl.classList.remove('hidden');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){errEl.textContent='Informe um e-mail válido.';errEl.classList.remove('hidden');return;}
  const btn=document.getElementById('c-btn'),txt=document.getElementById('c-btn-txt');btn.disabled=true;txt.textContent='Enviando...';
  try{
    await db.collection('contacts').add({nome,email,empresa:document.getElementById('c-empresa').value.trim(),telefone:document.getElementById('c-tel').value.trim(),tipo,mensagem:msg,criadoEm:firebase.firestore.FieldValue.serverTimestamp(),lido:false});
    document.getElementById('form-success').classList.remove('hidden');
    ['c-nome','c-empresa','c-email','c-tel','c-msg'].forEach(id=>document.getElementById(id).value='');document.getElementById('c-tipo').value='';
  }catch(e){errEl.textContent='Erro ao enviar. Tente novamente ou entre em contato pelo WhatsApp.';errEl.classList.remove('hidden');}
  finally{btn.disabled=false;txt.textContent='Enviar solicitação';}
}

      </div>
      <p class="text-gray-600 text-sm mt-3 leading-relaxed">${esc(c.mensagem)}</p>
      ${c.criadoEm?`<div class="text-gray-400 text-xs mt-2">${new Date(c.criadoEm.seconds*1000).toLocaleString('pt-BR')}</div>`:''}
    </div>`).join('')}</div>`;
  }catch(e){el.innerHTML=`<p class="text-red-500 text-sm">Erro ao carregar contatos.</p>`;}
}

/* ── ACTIONS ─────────────────────────────────────────────────── */
function showErr(id,msg){const el=document.getElementById(id||'err');if(!el)return;el.textContent=msg;el.classList.remove('hidden');}

async function doRegister(){
  const n=document.getElementById('rn').value.trim();
  const e=document.getElementById('re').value.trim();
  const p=document.getElementById('rp').value;
  if(!n){showErr('err','Informe seu nome.');return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(e,p);
    await db.collection('users').doc(cred.user.uid).set({
      name:n, email:e, isAdmin:false,
      etlAccess:[], relatorioAccess:[], consultaAccess:[],
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    setView('wait');
  }catch(err){showErr('err',firebaseErr(err.code));}
}

async function doLogin(){
  const e=document.getElementById('le').value.trim();
  const p=document.getElementById('lp').value;
  if(!e||!p){showErr('err','Preencha e-mail e senha.');return;}
  try{
    const cred=await auth.signInWithEmailAndPassword(e,p);
    setView('loading');
    const userData=await loadUserData(cred.user.uid);
    S.userData=userData;
    if(!userData){setView('wait');return;}

    const etlAccess      = userData.etlAccess      || [];
    const relatorioAccess= userData.relatorioAccess|| [];
    const consultaAccess = userData.consultaAccess || [];

    if(userData.isAdmin){
      [S.etls,S.relatorios,S.consultas]=await Promise.all([loadAllEtls(),loadAllRelatorios(),loadAllConsultas()]);
    } else {
      [S.etls,S.relatorios,S.consultas]=await Promise.all([
        loadAccessibleEtls(etlAccess),
        loadAccessibleRelatorios(relatorioAccess),
        loadAccessibleConsultas(consultaAccess)
      ]);
    }

    const temAcesso = userData.isAdmin
      || etlAccess.length > 0
      || relatorioAccess.length > 0
      || consultaAccess.length > 0;

    setView(temAcesso ? 'dashboard' : 'wait');
  }catch(err){
    console.error('Login error:',err);
    showErr('err',firebaseErr(err.code));
  }
}

function doLogout(){auth.signOut().then(()=>setView('landing'));}
function openEtl(i){S.currentEtl=S.etls[i];S.currentPage=0;setView('viewer');}
function goToPage(i){S.currentPage=i;render();setTimeout(applyHighlight,80);}

async function openAdmin(){
  setView('loading');
  try{
    [S.etls,S.allUsers,S.relatorios,S.consultas]=await Promise.all([loadAllEtls(),loadAllUsers(),loadAllRelatorios(),loadAllConsultas()]);
    S.adminTab='contacts';S.editingEtl=null;S.editingPageIdx=null;S.editingConsulta=null;S.editingConsultaPageIdx=null;S.editingRelatorio=null;
    setView('admin');setTimeout(loadContacts,100);

function setAdminTab(t){
  S.adminTab=t;S.editingEtl=null;S.editingPageIdx=null;S.editingConsulta=null;S.editingConsultaPageIdx=null;S.editingRelatorio=null;render();
  if(t==='contacts')setTimeout(loadContacts,100);
}

async function toggleAccess(uid,itemId,tipo){
  const u=S.allUsers.find(x=>x.id===uid);if(!u)return;
  const field=tipo==='etl'?'etlAccess':tipo==='consulta'?'consultaAccess':'relatorioAccess';
  const cur=u[field]||[],has=cur.includes(itemId);
  const next=has?cur.filter(x=>x!==itemId):[...cur,itemId];
  try{await db.collection('users').doc(uid).update({[field]:next});u[field]=next;render();toast(has?'Acesso removido.':'Acesso concedido!');}
  catch{toast('Erro ao atualizar acesso.');}
}

function editConsulta(id){const c=S.consultas.find(x=>x.id===id);if(!c)return;S.editingConsulta=JSON.parse(JSON.stringify(c));S.editingConsultaPageIdx=null;render();}
function editConsultaPage(id,pi){const c=S.consultas.find(x=>x.id===id);if(!c)return;S.editingConsulta=JSON.parse(JSON.stringify(c));S.editingConsultaPageIdx=pi;render();}
function addConsultaPage(id){const c=S.consultas.find(x=>x.id===id);if(!c)return;S.editingConsulta=JSON.parse(JSON.stringify(c));S.editingConsultaPageIdx='new';render();}

async function saveConsultaMeta(){
  const name=document.getElementById('ci-nome').value.trim();
  const desc=document.getElementById('ci-desc').value.trim();
  if(!name){toast('Informe o nome da consulta.');return;}
  try{
    if(S.editingConsulta.id){
      await db.collection('consultas').doc(S.editingConsulta.id).update({name,description:desc});
      Object.assign(S.consultas.find(x=>x.id===S.editingConsulta.id)||{},{name,description:desc});
    } else {
      const ref=await db.collection('consultas').add({name,description:desc,pages:[],criadoEm:firebase.firestore.FieldValue.serverTimestamp()});
      S.consultas.push({id:ref.id,name,description:desc,pages:[]});
    }
    S.editingConsulta=null;toast('Consulta salva!');render();
  }catch(e){toast('Erro ao salvar consulta.');}
}

async function saveConsultaPage(){
  const title=document.getElementById('cp-title').value.trim();
  const content=document.getElementById('cp-content').value;
  if(!title){toast('Informe o título da página.');return;}
  const pages=[...(S.editingConsulta.pages||[])];
  if(S.editingConsultaPageIdx==='new'){pages.push({id:'p'+Date.now(),title,content});}
  else{pages[S.editingConsultaPageIdx]={...(pages[S.editingConsultaPageIdx]||{}),title,content};}
  try{
    await db.collection('consultas').doc(S.editingConsulta.id).update({pages});
    const idx=S.consultas.findIndex(x=>x.id===S.editingConsulta.id);if(idx>=0)S.consultas[idx].pages=pages;
    S.editingConsulta.pages=pages;S.editingConsultaPageIdx=null;toast('Página salva!');render();
  }catch(e){toast('Erro ao salvar página.');}
}

async function deleteConsultaPage(){
  if(!confirm('Excluir esta página?'))return;
  const pages=[...(S.editingConsulta.pages||[])];pages.splice(S.editingConsultaPageIdx,1);
  try{
    await db.collection('consultas').doc(S.editingConsulta.id).update({pages});
    const idx=S.consultas.findIndex(x=>x.id===S.editingConsulta.id);if(idx>=0)S.consultas[idx].pages=pages;
    S.editingConsulta.pages=pages;S.editingConsultaPageIdx=null;toast('Página excluída.');render();
  }catch{toast('Erro ao excluir página.');}
}

async function deleteConsulta(id){
  if(!confirm('Excluir esta consulta?'))return;
  try{
    await db.collection('consultas').doc(id).delete();
    S.consultas=S.consultas.filter(x=>x.id!==id);
    for(const u of S.allUsers){
      if((u.consultaAccess||[]).includes(id)){
        const next=u.consultaAccess.filter(x=>x!==id);
        await db.collection('users').doc(u.id).update({consultaAccess:next});
        u.consultaAccess=next;
      }
    }
    toast('Consulta excluída.');render();
  }catch{toast('Erro ao excluir.');}
}

// ── Relatório CRUD ────────────────────────────────────────────
async function saveRelatorio(){
  const nome=document.getElementById('rel-nome').value.trim();
  const desc=document.getElementById('rel-desc').value.trim();
  const urlRaw=document.getElementById('rel-url').value.trim();
  const errEl=document.getElementById('rel-err');errEl.classList.add('hidden');
  if(!nome){errEl.textContent='Informe o nome do pacote.';errEl.classList.remove('hidden');return;}
  if(!urlRaw){errEl.textContent='Informe o link do arquivo.';errEl.classList.remove('hidden');return;}
  const fileUrl=normalizeDriveUrl(urlRaw);
  try{
    if(S.editingRelatorio?.id){
      await db.collection('relatorios').doc(S.editingRelatorio.id).update({name:nome,description:desc,fileUrl});
      const idx=S.relatorios.findIndex(x=>x.id===S.editingRelatorio.id);
      if(idx>=0)Object.assign(S.relatorios[idx],{name:nome,description:desc,fileUrl});
      toast('Pacote atualizado!');
    } else {
      const ref=await db.collection('relatorios').add({name:nome,description:desc,fileUrl,criadoEm:firebase.firestore.FieldValue.serverTimestamp()});
      S.relatorios.unshift({id:ref.id,name:nome,description:desc,fileUrl,criadoEm:{seconds:Date.now()/1000}});
      toast('Pacote cadastrado!');
    }
    S.editingRelatorio=null;render();
  }catch(e){errEl.textContent='Erro ao salvar: '+e.message;errEl.classList.remove('hidden');}
}

async function deleteRelatorio(id){
  if(!confirm('Excluir este pacote?'))return;
  try{
    await db.collection('relatorios').doc(id).delete();
    S.relatorios=S.relatorios.filter(x=>x.id!==id);
    for(const u of S.allUsers){
      if((u.relatorioAccess||[]).includes(id)){
        const next=u.relatorioAccess.filter(x=>x!==id);
        await db.collection('users').doc(u.id).update({relatorioAccess:next});
        u.relatorioAccess=next;
      }
    }
    toast('Pacote excluído.');render();
  }catch{toast('Erro ao excluir.');}
}

function firebaseErr(code){
  return({'auth/invalid-email':'E-mail inválido.','auth/user-not-found':'Usuário não encontrado.',
    'auth/wrong-password':'Senha incorreta.','auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/email-already-in-use':'Este e-mail já está em uso.','auth/weak-password':'Senha muito curta. Mínimo 6 caracteres.',
    'auth/too-many-requests':'Muitas tentativas. Aguarde e tente novamente.'})[code]||'Ocorreu um erro. Tente novamente.';
}

/* ── AUTH LISTENER ───────────────────────────────────────────── */
auth.onAuthStateChanged(async user=>{
  if(!user){S.user=null;S.userData=null;if(!['login','register','landing'].includes(S.view))setView('landing');return;}
  S.user=user;
  if(['dashboard','viewer','consultaViewer','admin'].includes(S.view))return;
  if(S.view==='landing')return;
});

render();
