## 1. NFe — PDF Individual (Confirmadas)

Esta consulta exporta um arquivo \`.pdf\` para cada NFe confirmada, nomeado com a chave de acesso do documento.

**ID — cole no campo de identificação da consulta:**
\`\`\`
25B1800257FC4094A90BA3FD84AD508D
\`\`\`

**SQL — cole no campo da consulta:**
\`\`\`sql
WITH periodo AS (
    SELECT
        make_date(:ano, :mes, 1) AS data_inicial,
        (
            make_date(:ano, :mes, 1)
            + INTERVAL '1 month'
            - INTERVAL '1 day'
        )::date AS data_final
)

SELECT
    se.codigo,
    se.nome,
    'Confirmadas_PDF'                              AS situacao,
    DATE_TRUNC('month', dfe.data_emissao)::date    AS data_referencia,
    'NFe_' || dfe.chave_acesso_dfe || '.pdf'       AS nome_arquivo,
    dfe.pdf                                        AS arquivo
FROM        documento_fiscal_eletronico dfe
            INNER JOIN nota_fiscal_saida nfs ON nfs.chave_acesso_nfe = dfe.chave_acesso_dfe
            INNER JOIN sis_empresa        se ON se.id_empresa         = dfe.id_empresa
            CROSS JOIN periodo             p
WHERE       DATE(dfe.data_emissao) BETWEEN p.data_inicial AND p.data_final
  AND       nfs.situacao          = 1
  AND       dfe.pdf               IS NOT NULL
  AND       dfe.tipo_documento    = 1
  AND       se.id_empresa         = :IdEmpresa
ORDER BY    dfe.data_emissao;
\`\`\`

WITH periodo AS (
    SELECT
        make_date(:ano, :mes, 1) AS data_inicial,
        (
            make_date(:ano, :mes, 1)
            + INTERVAL '1 month'
            - INTERVAL '1 day'
        )::date AS data_final
)

SELECT
    se.codigo,
    se.nome,
    'Confirmadas'                                                                          AS situacao,
    DATE_TRUNC('month', dfe.data_emissao)::date                                           AS data_referencia,
    'NFe_Confirmadas_' || to_char(p.data_inicial, 'YYYY-MM-DD')
        || '_a_' || to_char(p.data_final, 'YYYY-MM-DD') || '.zip'                        AS nome_arquivo,

            CROSS JOIN periodo             p

  AND       nfs.situacao          = 1
  AND       dfe.tipo_documento    = 1

function render() {
  const app = document.getElementById('app');
  const views = { loading, login, register, wait, dashboard, viewer, admin };
  app.innerHTML = (views[S.view] || loading)();
  if (S.view === 'viewer') setTimeout(applyHighlight, 80);
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function showErr(id, msg) {
  const el = document.getElementById(id||'err');
  if (!el) return;
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function doLogin() {
  const e = document.getElementById('le').value.trim();
  const p = document.getElementById('lp').value;
  try { await auth.signInWithEmailAndPassword(e, p); }
  catch(err) { showErr('err', firebaseErr(err.code)); }
}

async function doRegister() {
  const n = document.getElementById('rn').value.trim();
  const e = document.getElementById('re').value.trim();
  const p = document.getElementById('rp').value;
  if (!n) { showErr('err','Informe seu nome.'); return; }
  try {
    const snap   = await db.collection('users').limit(1).get();
    const isFirst = snap.empty;
    const cred   = await auth.createUserWithEmailAndPassword(e, p);
    await db.collection('users').doc(cred.user.uid).set({
      name:n, email:e, isAdmin:isFirst, etlAccess:[],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(err) { showErr('err', firebaseErr(err.code)); }
}

function doLogout() { auth.signOut(); }

function openEtl(i) { S.currentEtl = S.etls[i]; S.currentPage = 0; setView('viewer'); }

function goToPage(i) { S.currentPage = i; render(); setTimeout(applyHighlight,80); }

function backToDashboard() {
  S.editingEtl = null; S.editingPageIdx = null;
  setView('dashboard');
}

async function openAdmin() {
  setView('loading');
  try {
    [S.etls, S.allUsers] = await Promise.all([loadAllEtls(), loadAllUsers()]);
    S.adminTab = 'users'; S.editingEtl = null; S.editingPageIdx = null;
    setView('admin');
  } catch { toast('Erro ao carregar painel.'); setView('dashboard'); }
}

function setAdminTab(t) { S.adminTab = t; S.editingEtl = null; S.editingPageIdx = null; render(); }

async function toggleAccess(uid, etlId) {
  const u = S.allUsers.find(x => x.id === uid); if (!u) return;
  const cur = u.etlAccess||[], has = cur.includes(etlId);
  const next = has ? cur.filter(x=>x!==etlId) : [...cur, etlId];
  try {
    await db.collection('users').doc(uid).update({ etlAccess: next });
    u.etlAccess = next; render(); toast(has ? 'Acesso removido.' : 'Acesso concedido!');
  } catch { toast('Erro ao atualizar acesso.'); }
}

function newEtl()  { S.editingEtl = {icon:'📄',name:'',description:'',pages:[]}; S.editingPageIdx = null; render(); }
function cancelEdit() { S.editingEtl = null; S.editingPageIdx = null; render(); }

function editEtl(id) {
  const e = S.etls.find(x=>x.id===id); if (!e) return;
  S.editingEtl = JSON.parse(JSON.stringify(e)); S.editingPageIdx = null; render();
}
function editPage(id, pi) {
  const e = S.etls.find(x=>x.id===id); if (!e) return;
  S.editingEtl = JSON.parse(JSON.stringify(e)); S.editingPageIdx = pi; render();
}
function addPage(id) {
  const e = S.etls.find(x=>x.id===id); if (!e) return;
  S.editingEtl = JSON.parse(JSON.stringify(e)); S.editingPageIdx = 'new'; render();
}

async function saveEtlMeta() {
  const icon = document.getElementById('ei').value.trim()||'📄';
  const name = document.getElementById('en').value.trim();
  const desc = document.getElementById('ed').value.trim();
  if (!name) { toast('Informe o nome da ETL.'); return; }
  try {
    if (S.editingEtl.id) {
      await db.collection('etls').doc(S.editingEtl.id).update({ icon,name,description:desc });
      Object.assign(S.etls.find(x=>x.id===S.editingEtl.id)||{}, {icon,name,description:desc});
    } else {
      const ref = await db.collection('etls').add({
        icon,name,description:desc,pages:[],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      S.etls.push({id:ref.id,icon,name,description:desc,pages:[]});
    }
    S.editingEtl = null; toast('ETL salva!'); render();
  } catch(e) { toast('Erro ao salvar ETL.'); console.error(e); }
}

async function savePage() {
  const title   = document.getElementById('pt').value.trim();
  const content = document.getElementById('pc').value;
  if (!title) { toast('Informe o título da página.'); return; }
  const pages = [...(S.editingEtl.pages||[])];
  if (S.editingPageIdx === 'new') {
    pages.push({ id:'p'+Date.now(), title, content });
  } else {
    pages[S.editingPageIdx] = { ...(pages[S.editingPageIdx]||{}), title, content };
  }
  try {
    await db.collection('etls').doc(S.editingEtl.id).update({ pages });
    const idx = S.etls.findIndex(x=>x.id===S.editingEtl.id);
    if (idx>=0) S.etls[idx].pages = pages;
    S.editingEtl.pages = pages; S.editingPageIdx = null;
    toast('Página salva!'); render();
  } catch(e) { toast('Erro ao salvar página.'); console.error(e); }
}

async function deletePage() {
  if (!confirm('Excluir esta página?')) return;
  const pages = [...(S.editingEtl.pages||[])];
  pages.splice(S.editingPageIdx, 1);
  try {
    await db.collection('etls').doc(S.editingEtl.id).update({ pages });
    const idx = S.etls.findIndex(x=>x.id===S.editingEtl.id);
    if (idx>=0) S.etls[idx].pages = pages;
    S.editingEtl.pages = pages; S.editingPageIdx = null;
    toast('Página excluída.'); render();
  } catch(e) { toast('Erro ao excluir página.'); }
}

async function deleteEtl(id) {
  if (!confirm('Excluir esta ETL e todas as suas páginas?')) return;
  try {
    await db.collection('etls').doc(id).delete();
    S.etls = S.etls.filter(x=>x.id!==id);
    toast('ETL excluída.'); render();
  } catch(e) { toast('Erro ao excluir.'); }
}

async function seedDfe() {
  if (!confirm('Criar a ETL "DFe" com todas as páginas e conteúdo pré-preenchidos?')) return;
  try {
    const ref = await db.collection('etls').add({
      ...SEED_DFE, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    S.etls.push({ id:ref.id, ...SEED_DFE });
    toast('ETL DFe criada com sucesso!'); render();
  } catch(e) { toast('Erro ao criar ETL.'); console.error(e); }
}

function firebaseErr(code) {
  return ({
    'auth/invalid-email':        'E-mail inválido.',
    'auth/user-not-found':       'Usuário não encontrado.',
    'auth/wrong-password':       'Senha incorreta.',
    'auth/invalid-credential':   'E-mail ou senha incorretos.',
    'auth/email-already-in-use': 'Este e-mail já está em uso.',
    'auth/weak-password':        'Senha muito curta. Mínimo 6 caracteres.',
    'auth/too-many-requests':    'Muitas tentativas. Aguarde e tente novamente.',
  })[code] || 'Ocorreu um erro. Tente novamente.';
}

// ═══════════════════════════════════════════════
// AUTH LISTENER
// ═══════════════════════════════════════════════
auth.onAuthStateChanged(async user => {
  if (!user) { S.user = null; S.userData = null; setView('login'); return; }
  S.user = user; setView('loading');
  try {
    const userData = await loadUserData(user.uid);
    S.userData = userData;
    if (!userData) { setView('wait'); return; }
    S.etls = userData.isAdmin
      ? await loadAllEtls()
      : await loadAccessibleEtls(userData.etlAccess || []);
    setView((!userData.isAdmin && !userData.etlAccess?.length) ? 'wait' : 'dashboard');
  } catch(e) {
    console.error(e); toast('Erro ao carregar dados.'); setView('login');
  }
});
</script>
