<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Serviços — Nexus Data Engenharia</title>
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}

  /* Auth guard */
  #auth-guard{display:flex;align-items:center;justify-content:center;min-height:100vh}
  #auth-guard .inner{text-align:center}
  #auth-guard .spin{width:36px;height:36px;border:3px solid #BDD7EE;border-top-color:#2E75B6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  #auth-guard p{color:#1F3864;font-size:14px;font-weight:500}
  #app{display:none}

  .topbar{background:#1F3864;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  .topbar-title{color:#fff;font-size:16px;font-weight:500}
  .topbar-sub{color:#BDD7EE;font-size:12px;margin-top:2px}
  .topbar-actions{display:flex;gap:8px;align-items:center}
  .topbar-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 14px;font-size:13px;color:#fff;cursor:pointer;transition:background .15s;text-decoration:none;display:inline-flex;align-items:center}
  .topbar-btn:hover{background:rgba(255,255,255,.25)}
  .topbar-btn-icon{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 10px;font-size:14px;color:#fff;cursor:pointer;transition:background .15s;line-height:1}
  .topbar-btn-icon:hover{background:rgba(255,255,255,.25)}
  .content{max-width:700px;margin:0 auto;padding:16px}
  .metrics{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:16px}
  .metric{width:calc(50% - 10px)}
  @media(min-width:480px){.metric{width:calc(33.33% - 10px)}}
  @media(min-width:700px){.metric{width:calc(25% - 10px)}}
  @media(min-width:1000px){.metric{width:140px}}
  .metric{background:#fff;border-radius:10px;border:0.5px solid #e5e5e0;padding:12px;display:flex;flex-direction:column;justify-content:space-between}
  .metric-divider{border-left:2px solid #EEEDFE}
  .metric-label{font-size:11px;color:#888;line-height:1.3}
  .metric-value{font-size:18px;font-weight:500;color:#1a1a1a;margin-top:6px}
  .metric-value.green{color:#27500A}
  .metric-value.amber{color:#633806}

  /* Abas */
  .tabs{display:flex;gap:4px;margin-bottom:16px;background:#fff;border:0.5px solid #e5e5e0;border-radius:10px;padding:4px}
  .tab-btn{flex:1;padding:7px;font-size:13px;border:none;background:transparent;border-radius:7px;cursor:pointer;color:#666;transition:all .15s;font-family:inherit}
  .tab-btn.active{background:#1F3864;color:#fff;font-weight:500}
  .tab-btn:hover:not(.active){background:#f0f0f0}

  .filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .filter-btn{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#666;transition:all .15s}
  .filter-btn.active{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
  .cards{display:flex;flex-direction:column;gap:10px}
  .card{background:#fff;border:0.5px solid #e5e5e0;border-radius:12px;padding:14px 16px;transition:border-color .15s}
  .card:hover{border-color:#ccc}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
  .card-title{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.4}
  .card-client{font-size:12px;color:#888;margin-top:2px}
  .card-badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .badge{font-size:10px;padding:3px 7px;border-radius:6px;font-weight:500}
  .badge-pending{background:#FAEEDA;color:#633806}
  .badge-progress{background:#E6F1FB;color:#0C447C}
  .badge-done{background:#EAF3DE;color:#27500A}
  .badge-nao-orcado{background:#F1EFE8;color:#5F5E5A}
  .badge-orcamento{background:#EEEDFE;color:#3C3489}
  .badge-aguardando{background:#FAECE7;color:#993C1D}
  .badge-faturado{background:#EAF3DE;color:#085041}
  .badge-p1{background:#FCEBEB;color:#791F1F}
  .badge-p2{background:#FAEEDA;color:#633806}
  .badge-p3{background:#EAF3DE;color:#27500A}
  .card-body{font-size:12px;color:#666;margin-bottom:10px;line-height:1.5}
  .card-footer{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .meta{font-size:11px;color:#aaa}
  .meta span{color:#555;font-weight:500}
  .meta span.warn{color:#791F1F;font-weight:600}
  .tag-sem-custo{background:#f2f2f2;color:#aaa;font-size:10px;padding:2px 7px;border-radius:6px}
  .tag-50pago{background:#EAF3DE;color:#27500A;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500}
  .tag-50pendente{background:#FAEEDA;color:#633806;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500}
  .hours-bar{flex:1;min-width:100px}
  .hours-label{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:3px}
  .bar-track{height:4px;background:#eee;border-radius:2px;overflow:hidden}
  .bar-fill{height:100%;border-radius:2px;background:#378ADD;transition:width .3s}
  .bar-fill.over{background:#E24B4A}
  .card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid #f0f0f0;flex-wrap:wrap}
  .action-btn{font-size:11px;padding:4px 10px;border-radius:7px;border:0.5px solid #e0e0e0;background:transparent;cursor:pointer;color:#666;transition:all .15s}
  .action-btn:hover{background:#f5f5f5;color:#1a1a1a}
  .action-btn.danger{color:#E24B4A}
  .action-btn.back{color:#888}
  .action-btn:disabled{opacity:.3;cursor:default}
  .action-btn:disabled:hover{background:transparent;color:#666}
  .empty{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px}

  /* Calendário */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav-title{font-size:15px;font-weight:500;color:#1a1a1a}
  .cal-nav-btn{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#444;transition:all .15s}
  .cal-nav-btn:hover{background:#f0f0f0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{font-size:10px;color:#aaa;text-align:center;padding:4px 0;font-weight:500}
  .cal-day{background:#fff;border:0.5px solid #e5e5e0;border-radius:8px;min-height:64px;padding:5px;cursor:default;transition:border-color .15s}
  .cal-day.other-month{background:#f9f9f8;border-color:#f0f0ee}
  .cal-day.today{border-color:#378ADD;border-width:1px}
  .cal-day.has-items{cursor:pointer}
  .cal-day.has-items:hover{border-color:#aaa}
  .cal-day.selected{border-color:#1F3864;border-width:2px}
  .cal-day-num{font-size:11px;color:#888;margin-bottom:3px;font-weight:500}
  .cal-day.today .cal-day-num{color:#1F3864;font-weight:700}
  .cal-day.other-month .cal-day-num{color:#ccc}
  .cal-dot-list{display:flex;flex-direction:column;gap:2px}
  .cal-dot{font-size:9px;padding:1px 4px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
  .cal-detail{background:#fff;border:0.5px solid #e5e5e0;border-radius:12px;padding:14px 16px;margin-top:12px}
  .cal-detail-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:10px}
  .cal-detail-item{border-bottom:0.5px solid #f0f0f0;padding:8px 0;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .cal-detail-item:last-child{border-bottom:none}
  .cal-detail-nome{color:#1a1a1a;font-weight:500}
  .cal-detail-cliente{color:#888;font-size:11px;margin-top:1px}

  .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;overflow-y:auto;padding:20px}
  .overlay.open{display:flex;align-items:flex-start;justify-content:center}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:460px;padding:20px;margin:auto}
  .modal h3{font-size:16px;font-weight:500;margin-bottom:16px;color:#1a1a1a}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-size:12px;color:#666;margin-bottom:4px}
  .form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:9px 11px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#378ADD}
  .form-group textarea{resize:vertical;min-height:70px;font-family:inherit}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .btn{background:transparent;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#1a1a1a;transition:background .15s}
  .btn:hover{background:#f5f5f5}
  .btn-primary{background:#1F3864;border-color:#1F3864;color:#fff}
  .btn-primary:hover{background:#162a4e}
  .fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:#1F3864;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:50}
  @media(min-width:600px){.fab{display:none}}
  .valor-oculto{filter:blur(6px);user-select:none;pointer-events:none;transition:filter .2s}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;display:inline-block;margin-left:6px;vertical-align:middle}
  .sync-dot.offline{background:#E24B4A}
  .sync-dot.loading{background:#FFA726;animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Guard exibido enquanto verifica autenticação -->
<div id="auth-guard">
  <div class="inner">
    <div class="spin"></div>
    <p>Verificando acesso...</p>
  </div>
</div>

<!-- App só fica visível após auth confirmada -->
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <div>
        <div class="topbar-title">Gestão de serviços</div>
        <div class="topbar-sub">Nexus Data Engenharia</div>
      </div>
      <span class="sync-dot loading" id="sync-dot" title="Conectando..."></span>
    </div>
    <div class="topbar-actions">
      <a href="index.html" class="topbar-btn" title="Voltar ao portal">← Portal</a>
      <button class="topbar-btn-icon" id="btn-ocultar" onclick="toggleValores()" title="Ocultar valores">&#128065;</button>
      <button class="topbar-btn" onclick="openModal()">+ Novo</button>
    </div>
  </div>

  <div class="content">
    <div class="metrics" id="metrics"></div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-lista" onclick="setTab('lista')">📋 Lista</button>
      <button class="tab-btn" id="tab-calendario" onclick="setTab('calendario')">📅 Calendário</button>
    </div>

    <!-- Vista Lista -->
    <div id="view-lista">
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('nao orcado',this)">Não orçado</button>
        <button class="filter-btn" onclick="setFilter('orcamento enviado',this)">Orçamento enviado</button>
        <button class="filter-btn" onclick="setFilter('pendente',this)">Pendente</button>
        <button class="filter-btn" onclick="setFilter('em andamento',this)">Em andamento</button>
        <button class="filter-btn" onclick="setFilter('aguardando assinatura',this)">Ag. assinatura</button>
        <button class="filter-btn" onclick="setFilter('concluido',this)">Concluído</button>
        <button class="filter-btn" onclick="setFilter('faturado',this)">Faturado</button>
      </div>
      <div class="cards" id="cards"><div class="empty">Carregando...</div></div>
    </div>

    <!-- Vista Calendário -->
    <div id="view-calendario" style="display:none">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calMes(-1)">&#8592;</button>
        <span class="cal-nav-title" id="cal-titulo"></span>
        <button class="cal-nav-btn" onclick="calMes(+1)">&#8594;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="cal-detail-wrap"></div>
    </div>
  </div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title">Novo serviço</h3>
    <div class="form-group">
      <label>Nome do serviço</label>
      <input type="text" id="f-nome" placeholder="Ex: ETL para DDA">
    </div>
    <div class="form-group">
      <label>Cliente / Empresa</label>
      <input type="text" id="f-cliente" placeholder="Ex: Adaptive">
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="f-descricao" placeholder="Descreva o serviço..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Deadline (opcional)</label>
        <input type="date" id="f-deadline">
      </div>
      <div class="form-group">
        <label>Valor (R$) — 0 = sem custo</label>
        <input type="number" id="f-valor" placeholder="0" min="0" step="0.01" oninput="document.getElementById('fg-adiantamento').style.display=this.value>0?'block':'none'">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Horas estimadas</label>
        <input type="number" id="f-hest" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Horas gastas</label>
        <input type="number" id="f-hgas" placeholder="0" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="nao orcado">Não orçado</option>
          <option value="orcamento enviado">Orçamento enviado</option>
          <option value="pendente">Pendente</option>
          <option value="em andamento">Em andamento</option>
          <option value="aguardando assinatura">Aguardando assinatura</option>
          <option value="concluido">Concluído</option>
          <option value="faturado">Faturado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prioridade</label>
        <select id="f-prioridade">
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="fg-adiantamento" style="display:none">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="f-adiantamento" style="width:auto;accent-color:#1F3864">
        <span>50% de adiantamento recebido</span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── Firebase init ─────────────────────────────────────────────
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();
const col  = db.collection('servicos');

// ── Auth guard — só libera o app para admins ──────────────────
auth.onAuthStateChanged(async user => {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (!doc.exists || !doc.data().isAdmin) {
      window.location.href = 'index.html';
      return;
    }
  } catch {
    window.location.href = 'index.html';
    return;
  }
  // Admin confirmado — exibe o app
  document.getElementById('auth-guard').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  iniciarAgenda();
});

// ── Agenda — só inicializa após auth confirmada ───────────────
function iniciarAgenda() {
  col.orderBy('criadoEm','asc').onSnapshot(snap => {
    servicos = snap.docs.map(d => ({...d.data(), firestoreId: d.id}));
    setSyncDot('ok');
    render();
  }, err => {
    console.error(err);
    setSyncDot('offline');
  });
}

// ── Estado ────────────────────────────────────────────────────
let servicos    = [];
let filtro      = 'todos';
let editId      = null;
let ocultarVal  = false;
let processando = false;
let abaAtiva    = 'lista';
let calAno      = new Date().getFullYear();
let calMesAtual = new Date().getMonth();
let calDiaSel   = null;

// ── Sync dot ──────────────────────────────────────────────────
function setSyncDot(state){
  const dot = document.getElementById('sync-dot');
  if(!dot) return;
  dot.className = 'sync-dot' + (state==='ok' ? '' : state==='loading' ? ' loading' : ' offline');
  dot.title = state==='ok' ? 'Sincronizado' : state==='loading' ? 'Sincronizando...' : 'Sem conexão';
}

// ── CRUD ──────────────────────────────────────────────────────
async function salvarFirestore(obj, firestoreId=null){
  setSyncDot('loading');
  try{
    if(firestoreId){
      await col.doc(firestoreId).update(obj);
    } else {
      obj.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
      await col.add(obj);
    }
  } catch(e){ setSyncDot('offline'); alert('Erro ao salvar: '+e.message); }
}

async function deletarFirestore(firestoreId){
  setSyncDot('loading');
  try{ await col.doc(firestoreId).delete(); }
  catch(e){ setSyncDot('offline'); alert('Erro ao remover: '+e.message); }
}

// ── Helpers ───────────────────────────────────────────────────
function toggleValores(){
  ocultarVal = !ocultarVal;
  document.getElementById('btn-ocultar').innerHTML = ocultarVal ? '&#128683;' : '&#128065;';
  render();
}
function vClass(){ return ocultarVal ? 'valor-oculto' : ''; }
function diasRestantes(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date())/(1000*60*60*24)); }
function fmtData(d){ if(!d) return null; const [y,m,dia]=d.split('-'); return `${dia}/${m}/${y}`; }
function fmtValor(v){ return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toDateKey(ts){
  if(!ts) return null;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function statusBadge(s){
  const map={['nao orcado']:'badge-nao-orcado',pendente:'badge-pending',['orcamento enviado']:'badge-orcamento',['em andamento']:'badge-progress',['aguardando assinatura']:'badge-aguardando',concluido:'badge-done',faturado:'badge-faturado'};
  const label={['nao orcado']:'Não orçado',pendente:'Pendente',['orcamento enviado']:'Orçamento enviado',['em andamento']:'Em andamento',['aguardando assinatura']:'Ag. assinatura',concluido:'Concluído',faturado:'Faturado'};
  return `<span class="badge ${map[s]||''}">${label[s]||s}</span>`;
}
function prioBadge(p){
  const map={alta:'badge-p1',media:'badge-p2',baixa:'badge-p3'};
  const label={alta:'Alta',media:'Média',baixa:'Baixa'};
  return `<span class="badge ${map[p]}">${label[p]}</span>`;
}
function statusDotClass(s){
  const map={['nao orcado']:'badge-nao-orcado',pendente:'badge-pending',['orcamento enviado']:'badge-orcamento',['em andamento']:'badge-progress',['aguardando assinatura']:'badge-aguardando',concluido:'badge-done',faturado:'badge-faturado'};
  return map[s]||'';
}

// ── Abas ──────────────────────────────────────────────────────
function setTab(tab){
  abaAtiva = tab;
  document.getElementById('tab-lista').classList.toggle('active', tab==='lista');
  document.getElementById('tab-calendario').classList.toggle('active', tab==='calendario');
  document.getElementById('view-lista').style.display = tab==='lista' ? '' : 'none';
  document.getElementById('view-calendario').style.display = tab==='calendario' ? '' : 'none';
  if(tab==='calendario') renderCalendario();
}

// ── Métricas ──────────────────────────────────────────────────
function renderMetrics(){
  const total      = servicos.length;
  const andamento  = servicos.filter(s=>s.status==='em andamento').length;
  const naoOrcado  = servicos.filter(s=>s.status==='nao orcado').length;
  const orcEnviado = servicos.filter(s=>s.status==='orcamento enviado').length;
  const aguardando = servicos.filter(s=>s.status==='aguardando assinatura').length;
  const concluido  = servicos.filter(s=>s.status==='concluido').length;

  const valorOrcEnviado = servicos
    .filter(s=>s.status==='orcamento enviado')
    .reduce((a,s)=>a+Number(s.valor||0),0);

  const STATUS_A_RECEBER = ['pendente','em andamento','aguardando assinatura','concluido'];
  const aReceber = servicos
    .filter(s=>STATUS_A_RECEBER.includes(s.status))
    .reduce((a,s)=>{
      const valor = Number(s.valor||0);
      return a + (s.adiantamentoPago ? valor * 0.5 : valor);
    }, 0);

  const valorFaturado = servicos.reduce((a,s)=>{
    if(s.status==='faturado') return a + Number(s.valor||0);
    if(s.adiantamentoPago)    return a + Number(s.valor||0) * 0.5;
    return a;
  }, 0);

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Não orçados</div><div class="metric-value" style="color:#5F5E5A">${naoOrcado}</div></div>
    <div class="metric"><div class="metric-label">Orç. enviado</div><div class="metric-value" style="color:#3C3489">${orcEnviado}</div></div>
    <div class="metric"><div class="metric-label">Em andamento</div><div class="metric-value amber">${andamento}</div></div>
    <div class="metric"><div class="metric-label">Ag. assinatura</div><div class="metric-value" style="color:#993C1D">${aguardando}</div></div>
    <div class="metric"><div class="metric-label">Concluídos</div><div class="metric-value" style="color:#085041">${concluido}</div></div>
    <div class="metric metric-divider"><div class="metric-label">Em negociação</div><div class="metric-value" style="color:#3C3489"><span class="${vClass()}">${fmtValor(valorOrcEnviado)}</span></div></div>
    <div class="metric"><div class="metric-label">A receber</div><div class="metric-value green"><span class="${vClass()}">${fmtValor(aReceber)}</span></div></div>
    <div class="metric"><div class="metric-label">Faturado</div><div class="metric-value green"><span class="${vClass()}">${fmtValor(valorFaturado)}</span></div></div>
  `;
}

// ── Cards ─────────────────────────────────────────────────────
function renderCards(){
  const lista = filtro==='todos' ? servicos : servicos.filter(s=>s.status===filtro);
  const el = document.getElementById('cards');
  if(!lista.length){el.innerHTML='<div class="empty">Nenhum serviço encontrado.</div>';return;}

  el.innerHTML = [...lista].sort((a,b)=>{
    const po={alta:0,media:1,baixa:2};
    const ad=a.deadline?new Date(a.deadline):new Date('9999-12-31');
    const bd=b.deadline?new Date(b.deadline):new Date('9999-12-31');
    return po[a.prioridade]-po[b.prioridade]||ad-bd;
  }).map(s=>{
    const dias=diasRestantes(s.deadline);
    const warnClass=dias!==null&&dias<=3&&s.status!=='concluido'?'warn':'';
    let deadlineLabel='';
    if(s.deadline){
      if(s.status==='concluido') deadlineLabel=`Entregue em ${fmtData(s.deadline)}`;
      else if(dias<0) deadlineLabel=`Atrasado ${Math.abs(dias)}d`;
      else if(dias===0) deadlineLabel='Vence hoje';
      else deadlineLabel=`${dias}d restantes`;
    }
    const deadlineMeta = s.deadline
      ? `<div class="meta">Deadline <span class="${warnClass}">${fmtData(s.deadline)} · ${deadlineLabel}</span></div>`
      : `<div class="meta">Deadline <span>—</span></div>`;
    const valorMeta = s.valor>0
      ? `<div class="meta">Valor <span class="${vClass()}">${fmtValor(s.valor)}</span></div>`
      : `<div class="meta"><span class="tag-sem-custo">sem custo</span></div>`;
    const adiantadoTag = (()=>{
      if(s.valor<=0) return '';
      const statusComIndicador = ['em andamento','aguardando assinatura','concluido','faturado'];
      if(!statusComIndicador.includes(s.status)) return '';
      if(s.adiantamentoPago) return `<span class="tag-50pago">50% recebido</span>`;
      return `<span class="tag-50pendente">100% pendente</span>`;
    })();
    const horasBar = s.hEst>0?`
      <div class="hours-bar">
        <div class="hours-label"><span>Horas</span><span>${s.hGas}h / ${s.hEst}h</span></div>
        <div class="bar-track"><div class="bar-fill ${s.hGas>s.hEst?'over':''}" style="width:${Math.min(Math.round(s.hGas/s.hEst*100),100)}%"></div></div>
      </div>`:'';

    const ordem=['nao orcado','orcamento enviado','pendente','em andamento','aguardando assinatura','concluido','faturado'];
    const idx = ordem.indexOf(s.status);
    const podeVoltar  = idx > 0;
    const podeAvancar = idx < ordem.length - 1;

    return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${s.nome}</div>
          <div class="card-client">${s.cliente}</div>
        </div>
        <div class="card-badges">${prioBadge(s.prioridade)} ${statusBadge(s.status)}</div>
      </div>
      <div class="card-body">${s.descricao}</div>
      <div class="card-footer">${deadlineMeta}${valorMeta}${adiantadoTag}${horasBar}</div>
      <div class="card-actions">
        <button class="action-btn" onclick="editarServico('${s.firestoreId}')">Editar</button>
        <button class="action-btn back" onclick="voltarStatus('${s.firestoreId}')" ${podeVoltar?'':'disabled'}>← Voltar status</button>
        <button class="action-btn" onclick="mudarStatus('${s.firestoreId}')" ${podeAvancar?'':'disabled'}>Avançar status →</button>
        <button class="action-btn danger" onclick="deletar('${s.firestoreId}')">Remover</button>
      </div>
    </div>`;
  }).join('');
}

// ── Calendário ────────────────────────────────────────────────
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOWS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function calMes(delta){
  calMesAtual += delta;
  if(calMesAtual > 11){ calMesAtual = 0; calAno++; }
  if(calMesAtual < 0) { calMesAtual = 11; calAno--; }
  calDiaSel = null;
  renderCalendario();
}

function renderCalendario(){
  document.getElementById('cal-titulo').textContent = `${MESES[calMesAtual]} ${calAno}`;
  const mapa = {};
  servicos.forEach(s=>{
    const k = toDateKey(s.criadoEm);
    if(!k) return;
    if(!mapa[k]) mapa[k] = [];
    mapa[k].push(s);
  });
  const hoje = new Date();
  const hojeKey = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
  const primeiroDia = new Date(calAno, calMesAtual, 1).getDay();
  const diasNoMes   = new Date(calAno, calMesAtual+1, 0).getDate();
  const diasMesAnt  = new Date(calAno, calMesAtual, 0).getDate();
  let html = DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i = primeiroDia - 1; i >= 0; i--){
    const dia = diasMesAnt - i;
    const m   = calMesAtual === 0 ? 12 : calMesAtual;
    const a   = calMesAtual === 0 ? calAno - 1 : calAno;
    const k   = `${a}-${String(m).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
    html += renderDia(dia, k, mapa[k]||[], true, hojeKey);
  }
  for(let dia = 1; dia <= diasNoMes; dia++){
    const k = `${calAno}-${String(calMesAtual+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
    html += renderDia(dia, k, mapa[k]||[], false, hojeKey);
  }
  const total = primeiroDia + diasNoMes;
  const resto = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let dia = 1; dia <= resto; dia++){
    const m = calMesAtual === 11 ? 1 : calMesAtual + 2;
    const a = calMesAtual === 11 ? calAno + 1 : calAno;
    const k = `${a}-${String(m).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
    html += renderDia(dia, k, mapa[k]||[], true, hojeKey);
  }
  document.getElementById('cal-grid').innerHTML = html;
  renderCalDetail();
}

function renderDia(dia, key, items, otherMonth, hojeKey){
  const classes = ['cal-day'];
  if(otherMonth)      classes.push('other-month');
  if(key===hojeKey)   classes.push('today');
  if(items.length)    classes.push('has-items');
  if(key===calDiaSel) classes.push('selected');
  const dots = items.slice(0,3).map(s=>
    `<div class="cal-dot ${statusDotClass(s.status)}">${s.nome}</div>`
  ).join('');
  const mais = items.length > 3 ? `<div class="cal-dot" style="color:#aaa">+${items.length-3} mais</div>` : '';
  const onclick = items.length ? `onclick="calSelDia('${key}')"` : '';
  return `<div class="${classes.join(' ')}" ${onclick}>
    <div class="cal-day-num">${dia}</div>
    <div class="cal-dot-list">${dots}${mais}</div>
  </div>`;
}

function calSelDia(key){
  calDiaSel = calDiaSel === key ? null : key;
  renderCalendario();
}

function renderCalDetail(){
  const wrap = document.getElementById('cal-detail-wrap');
  if(!calDiaSel){ wrap.innerHTML=''; return; }
  const mapa = {};
  servicos.forEach(s=>{
    const k = toDateKey(s.criadoEm);
    if(!k) return;
    if(!mapa[k]) mapa[k] = [];
    mapa[k].push(s);
  });
  const itens = mapa[calDiaSel]||[];
  if(!itens.length){ wrap.innerHTML=''; return; }
  const [a,m,d] = calDiaSel.split('-');
  const titulo = `${d}/${m}/${a} — ${itens.length} serviço${itens.length>1?'s':''}`;
  const linhas = itens.map(s=>`
    <div class="cal-detail-item">
      <div>
        <div class="cal-detail-nome">${s.nome}</div>
        <div class="cal-detail-cliente">${s.cliente}</div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">
        ${prioBadge(s.prioridade)} ${statusBadge(s.status)}
      </div>
    </div>`).join('');
  wrap.innerHTML = `
    <div class="cal-detail">
      <div class="cal-detail-title">${titulo}</div>
      ${linhas}
    </div>`;
}

function render(){
  renderMetrics();
  renderCards();
  if(abaAtiva==='calendario') renderCalendario();
}

function setFilter(f,btn){
  filtro=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(firestoreId=null){
  editId=firestoreId;
  document.getElementById('modal-title').textContent=firestoreId?'Editar serviço':'Novo serviço';
  if(firestoreId){
    const s=servicos.find(x=>x.firestoreId===firestoreId);
    document.getElementById('f-nome').value=s.nome;
    document.getElementById('f-cliente').value=s.cliente==='—'?'':s.cliente;
    document.getElementById('f-descricao').value=s.descricao;
    document.getElementById('f-deadline').value=s.deadline||'';
    document.getElementById('f-valor').value=s.valor;
    document.getElementById('f-hest').value=s.hEst;
    document.getElementById('f-hgas').value=s.hGas;
    document.getElementById('f-status').value=s.status;
    document.getElementById('f-prioridade').value=s.prioridade;
    document.getElementById('f-adiantamento').checked=!!(s.adiantamentoPago);
    document.getElementById('fg-adiantamento').style.display=s.valor>0?'block':'none';
  } else {
    ['f-nome','f-cliente','f-descricao','f-deadline','f-valor','f-hest','f-hgas'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-status').value='nao orcado';
    document.getElementById('f-prioridade').value='media';
    document.getElementById('f-adiantamento').checked=false;
    document.getElementById('fg-adiantamento').style.display='none';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); editId=null; }
document.getElementById('overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

async function salvar(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){alert('Informe o nome do serviço.');return;}
  const obj={
    nome,
    cliente:document.getElementById('f-cliente').value.trim()||'—',
    descricao:document.getElementById('f-descricao').value.trim(),
    deadline:document.getElementById('f-deadline').value||'',
    valor:Number(document.getElementById('f-valor').value)||0,
    hEst:Number(document.getElementById('f-hest').value)||0,
    hGas:Number(document.getElementById('f-hgas').value)||0,
    status:document.getElementById('f-status').value,
    prioridade:document.getElementById('f-prioridade').value,
    adiantamentoPago:document.getElementById('f-adiantamento').checked,
  };
  closeModal();
  await salvarFirestore(obj, editId);
}

function editarServico(firestoreId){ openModal(firestoreId); }

async function mudarStatus(firestoreId){
  if(processando) return;
  processando = true;
  try{
    const s=servicos.find(x=>x.firestoreId===firestoreId);
    const ordem=['nao orcado','orcamento enviado','pendente','em andamento','aguardando assinatura','concluido','faturado'];
    const i=ordem.indexOf(s.status);
    if(i<ordem.length-1){
      const statusAnterior = s.status;
      const novoStatus = ordem[i+1];
      const update = {status: novoStatus};
      if(statusAnterior==='pendente' && novoStatus==='em andamento' && s.valor>0){
        const adiantado = confirm(`O adiantamento de 50% (${fmtValor(Number(s.valor)*0.5)}) referente ao serviço "${s.nome}" foi recebido?`);
        if(adiantado) update.adiantamentoPago = true;
      }
      await salvarFirestore(update, firestoreId);
    }
  } finally { processando = false; }
}

async function voltarStatus(firestoreId){
  if(processando) return;
  processando = true;
  try{
    const s=servicos.find(x=>x.firestoreId===firestoreId);
    const ordem=['nao orcado','orcamento enviado','pendente','em andamento','aguardando assinatura','concluido','faturado'];
    const i=ordem.indexOf(s.status);
    if(i>0){
      const novoStatus = ordem[i-1];
      const update = {status: novoStatus};
      if(i<=3) update.adiantamentoPago = false;
      await salvarFirestore(update, firestoreId);
    }
  } finally { processando = false; }
}

async function deletar(firestoreId){
  if(confirm('Remover este serviço?')) await deletarFirestore(firestoreId);
}
</script>
